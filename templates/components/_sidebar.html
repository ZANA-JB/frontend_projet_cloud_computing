<aside class="w-64 border-r border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 flex flex-col">
    <div class="p-6 flex items-center gap-3">
        <div class="bg-primary p-1.5 rounded-lg text-white">
            <span class="material-symbols-outlined block">folder_shared</span>
        </div>
        <h1 class="text-xl font-bold tracking-tight text-slate-900 dark:text-white">FileDrive</h1>
    </div>
    <nav class="flex-1 px-4 space-y-1">
        <a class="flex items-center gap-3 px-3 py-2.5 rounded-lg bg-primary/10 text-primary font-semibold" href="{{ url_for('dashboard') }}">
            <span class="material-symbols-outlined">folder_open</span>
            <span>Mes fichiers</span>
        </a>
        {% if request.endpoint != 'dashboard' %}
        <a class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors" href="{{ url_for('home') }}">
            <span class="material-symbols-outlined">public</span>
            <span>Fichiers publics</span>
        </a>
        {% endif %}

    </nav>
    <div class="p-4 border-t border-slate-200 dark:border-slate-800">
        <div class="bg-slate-50 dark:bg-slate-800/50 rounded-xl p-4">
            <div class="flex items-center justify-between mb-2">
                <span class="text-xs font-medium text-slate-500">Stockage</span>
                <span class="text-xs font-bold text-slate-700 dark:text-slate-300">75 % utilisé</span>
            </div>
            <div class="w-full bg-slate-200 dark:bg-slate-700 rounded-full h-1.5 mb-3">
                <div class="bg-primary h-1.5 rounded-full" style="width: 75%"></div>
            </div>
            <p class="text-[10px] text-slate-500">7.5 Go sur 10 Go utilisés</p>
        </div>
    </div>
</aside>
